; TerraGuard AI — Freenove Control Board V5 (ESP32) PlatformIO 設定
; プロトタイプ用: センサ取得・可視化のベースプロジェクト
; まずは LED 点滅（Lチカ）で書き込み動作を確認する。

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; シリアルモニタ設定（115200 baud / JSON 出力に統一）
monitor_speed = 115200
upload_speed = 921600

; ビルドフラグ
build_flags =
    -D LED_BUILTIN=2          ; Freenove Control Board V5 オンボードLED = GPIO2
