; TerraGuard AI — Freenove Control Board V5 (FNK0096) PlatformIO 設定
;
; 重要: このボードは Arduino UNO R4 WiFi 互換である。
;   - メインMCU: Renesas RA4M1 (Arm Cortex-M4) ← USB-Cに直結。スケッチはここで動く
;   - ESP32-S3: WiFi/Bluetooth 専用のサブモジュール（USB-Cには直結していない）
; したがって USB-C からの書き込み対象は RA4M1。platform は renesas-ra を使う。
;
; プロトタイプ用: センサ取得・可視化のベースプロジェクト
; まずは LED 点滅（Lチカ）で書き込み動作を確認する。

[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino

; シリアルモニタ設定（115200 baud / JSON 出力に統一）
monitor_speed = 115200
