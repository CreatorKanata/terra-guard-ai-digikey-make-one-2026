# オンボード温度センサ P3T1755DP を I3C で読むために必要なコンポーネント
CONFIG_MCUX_COMPONENT_driver.i3c=y
CONFIG_MCUX_COMPONENT_driver.p3t1755=y

# 外部I²Cセンサ（MLX90640 等）を LPI2C2/FLEXCOMM2 で読むために必要なコンポーネント
CONFIG_MCUX_COMPONENT_driver.lpflexcomm_lpi2c=y

# eIQ Neutron NPU 推論（TensorFlow Lite Micro）。
# tflm_cifar10 サンプルと同じ有効化。これで model.cpp / TFLite Micro / Neutron
# ドライバがビルドに引かれる（[[npu-converter-version-mismatch]] のSDK内蔵3.0.0ドライバ）。
CONFIG_MCUX_COMPONENT_middleware.eiq.tensorflow_lite_micro.binary=y
CONFIG_MCUX_PRJSEG_module.dsp_support=y
CONFIG_MCUX_PRJSEG_config.syslib.xos=y
# Neutron NPU カーネル(neutron.cpp: Register_NEUTRON_GRAPH 等)を引く。
CONFIG_MCUX_COMPONENT_middleware.eiq.tensorflow_lite_micro.neutron=y
